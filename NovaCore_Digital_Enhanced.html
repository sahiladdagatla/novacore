body{background-color:#131318;color:#e4e1e9;overflow-x:hidden;position:relative}

/* SCROLL PROGRESS */
#scroll-progress{position:fixed;top:0;left:0;height:2px;width:0%;background:linear-gradient(90deg,#06B6D4,#7C3AED,#06B6D4);background-size:200% 100%;animation:progressShimmer 2s linear infinite;z-index:10000;box-shadow:0 0 8px rgba(6,182,212,.8),0 0 20px rgba(6,182,212,.4)}

/* CURSOR */
#cursor-crosshair{position:fixed;pointer-events:none;z-index:99999;transform:translate(-50%,-50%)}
#cursor-crosshair .ch,#cursor-crosshair .cv{position:absolute;background:#06B6D4;box-shadow:0 0 6px rgba(6,182,212,.9)}
#cursor-crosshair .ch{width:14px;height:1.5px;top:50%;left:50%;transform:translate(-50%,-50%)}
#cursor-crosshair .cv{width:1.5px;height:14px;top:50%;left:50%;transform:translate(-50%,-50%)}
#cursor-ring{position:fixed;pointer-events:none;z-index:99998;width:20px;height:20px;border:1.5px solid #06B6D4;border-radius:50%;transform:translate(-50%,-50%);box-shadow:0 0 10px rgba(6,182,212,.5);transition:width .25s cubic-bezier(.23,1,.32,1),height .25s cubic-bezier(.23,1,.32,1),border-color .25s ease,box-shadow .25s ease}
#cursor-ring.expanded{width:40px;height:40px;border-color:#7C3AED;box-shadow:0 0 15px rgba(124,58,237,.6)}

/* SECTION REVEAL */
.reveal-section{opacity:0;transform:translateY(40px);transition:opacity .7s ease,transform .7s ease}
.reveal-section.visible{opacity:1;transform:translateY(0)}
.reveal-child{opacity:0;transform:translateY(30px);transition:opacity .6s ease,transform .6s ease}
.reveal-child.visible{opacity:1;transform:translateY(0)}

/* NEON FLICKER */
@keyframes neonFlicker{0%{opacity:1}10%{opacity:.15}16%{opacity:1}20%{opacity:.1}26%{opacity:1}30%{opacity:.25}36%{opacity:1}100%{opacity:1}}
.flicker-active{animation:neonFlicker .7s ease forwards}

/* EQUALIZER */
#eq-widget{position:fixed;bottom:24px;right:24px;z-index:9000;display:flex;align-items:flex-end;gap:4px;padding:10px 14px;background:rgba(10,10,20,.8);backdrop-filter:blur(12px);border:1px solid rgba(6,182,212,.2);border-radius:10px;box-shadow:0 0 20px rgba(6,182,212,.1)}
.eq-bar{width:4px;border-radius:2px;background:linear-gradient(to top,#06B6D4,#7C3AED);box-shadow:0 0 6px rgba(6,182,212,.7)}
@keyframes eq1{0%,100%{height:6px}25%{height:22px}50%{height:12px}75%{height:18px}}
@keyframes eq2{0%,100%{height:14px}20%{height:8px}50%{height:24px}80%{height:10px}}
@keyframes eq3{0%,100%{height:10px}30%{height:20px}60%{height:6px}85%{height:16px}}
.eq-bar:nth-child(1){animation:eq1 .9s ease-in-out infinite}
.eq-bar:nth-child(2){animation:eq2 .7s ease-in-out infinite}
.eq-bar:nth-child(3){animation:eq3 1.1s ease-in-out infinite}

.ambient-glow{position:absolute;border-radius:50%;filter:blur(120px);z-index:-2;opacity:.08;pointer-events:none}
@keyframes float{0%{transform:translateY(0px) rotate3d(1,1,1,0deg)}50%{transform:translateY(-20px) rotate3d(1,1,1,2deg)}100%{transform:translateY(0px) rotate3d(1,1,1,0deg)}}
@keyframes glitch{0%{transform:translate(0);clip-path:inset(40% 0 61% 0)}20%{transform:translate(-2px,2px);clip-path:inset(92% 0 1% 0)}40%{transform:translate(-2px,-2px);clip-path:inset(43% 0 1% 0)}60%{transform:translate(2px,2px);clip-path:inset(25% 0 58% 0)}80%{transform:translate(2px,-2px);clip-path:inset(54% 0 7% 0)}100%{transform:translate(0);clip-path:inset(58% 0 43% 0)}}
.glitch-text{position:relative}
.glitch-text::before,.glitch-text::after{content:attr(data-text);position:absolute;top:0;left:0;width:100%;height:100%;opacity:.8}
.glitch-text::before{left:2px;text-shadow:-2px 0 #f00;animation:glitch .4s infinite linear alternate-reverse;display:none}
.glitch-text::after{left:-2px;text-shadow:-2px 0 #0ff;animation:glitch .4s infinite linear alternate;display:none}

@keyframes blink-cursor{0%,100%{opacity:1}50%{opacity:0}}

<script>
// BG CANVAS
const canvas=document.getElementById('bgCanvas');const ctx=canvas.getContext('2d');let width,height,nodes=[],gridOffset=0;
function init(){width=canvas.width=window.innerWidth;height=canvas.height=window.innerHeight;nodes=[];for(let i=0;i<80;i++)nodes.push({x:Math.random()*width,y:Math.random()*height,vx:(Math.random()-.5)*.8+(Math.random()>.5?.3:-.3),vy:(Math.random()-.5)*.8+(Math.random()>.5?.3:-.3),phase:Math.random()*Math.PI*2});}
function draw(){ctx.clearRect(0,0,width,height);ctx.fillStyle='rgba(6,182,212,0.05)';gridOffset=(gridOffset+.5)%30;for(let x=0;x<width;x+=30)for(let y=-30;y<height;y+=30){ctx.beginPath();ctx.arc(x,y+gridOffset,1,0,Math.PI*2);ctx.fill();}const time=Date.now()*.002;nodes.forEach(n=>{n.x+=n.vx;n.y+=n.vy;if(n.x<0||n.x>width)n.vx*=-1;if(n.y<0||n.y>height)n.vy*=-1;ctx.fillStyle='#7C3AED';ctx.beginPath();ctx.arc(n.x,n.y,3+Math.sin(time+n.phase),0,Math.PI*2);ctx.fill();});ctx.strokeStyle='rgba(6,182,212,0.2)';ctx.lineWidth=1;for(let i=0;i<nodes.length;i++)for(let j=i+1;j<nodes.length;j++){const dx=nodes[i].x-nodes[j].x,dy=nodes[i].y-nodes[j].y;if(dx*dx+dy*dy<22500){ctx.beginPath();ctx.moveTo(nodes[i].x,nodes[i].y);ctx.lineTo(nodes[j].x,nodes[j].y);ctx.stroke();}}ctx.fillStyle='rgba(0,255,255,0.015)';for(let i=0;i<height;i+=4)ctx.fillRect(0,i,width,1);requestAnimationFrame(draw);}
window.addEventListener('resize',init);init();draw();

// 1. SCROLL PROGRESS BAR
const pb=document.getElementById('scroll-progress');
window.addEventListener('scroll',()=>{const t=document.documentElement.scrollHeight-window.innerHeight;pb.style.width=(t>0?(window.scrollY/t)*100:0)+'%';},{passive:true});

// 2. SECTION REVEAL + CHILD STAGGER
const ro=new IntersectionObserver(entries=>{entries.forEach(e=>{if(!e.isIntersecting)return;e.target.classList.add('visible');e.target.querySelectorAll('.reveal-child').forEach((c,i)=>setTimeout(()=>c.classList.add('visible'),i*100));ro.unobserve(e.target);});},{threshold:.1});
document.querySelectorAll('.reveal-section').forEach(el=>ro.observe(el));

// 3. NEON TEXT FLICKER (random heading every 8-12s)
const flickerEls=Array.from(document.querySelectorAll('.flickerable'));
function doFlicker(){const delay=8000+Math.random()*4000;setTimeout(()=>{if(flickerEls.length){const t=flickerEls[Math.floor(Math.random()*flickerEls.length)];t.classList.add('flicker-active');t.addEventListener('animationend',()=>t.classList.remove('flicker-active'),{once:true});}doFlicker();},delay);}
doFlicker();

// 5. LERP CURSOR
const ring=document.getElementById('cursor-ring');const cross=document.getElementById('cursor-crosshair');
let mx=0,my=0,rx=0,ry=0;
document.addEventListener('mousemove',e=>{mx=e.clientX;my=e.clientY;cross.style.left=mx+'px';cross.style.top=my+'px';});
const HT='button,a,.cursor-hover-target,input,textarea,[role="button"]';
document.addEventListener('mouseover',e=>{if(e.target.closest(HT))ring.classList.add('expanded');});
document.addEventListener('mouseout',e=>{if(e.target.closest(HT))ring.classList.remove('expanded');});
document.addEventListener('mouseleave',()=>{ring.style.opacity='0';cross.style.opacity='0';});
document.addEventListener('mouseenter',()=>{ring.style.opacity='1';cross.style.opacity='1';});
(function lerp(){rx+=(mx-rx)*.12;ry+=(my-ry)*.12;ring.style.left=rx+'px';ring.style.top=ry+'px';requestAnimationFrame(lerp);})();
</script>
